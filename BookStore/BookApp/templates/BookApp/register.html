<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f7f7f7;
            margin: 0;
        }
        .register-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 30px;
            width: 360px;
        }
        .register-card h1 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 18px;
        }
        .register-card form {
            display: grid;
            gap: 12px;
        }
        .register-card button {
            background: #2563eb;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .register-card button:hover {
            background: #1d4ed8;
        }
        .form-row {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>Create an account</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
